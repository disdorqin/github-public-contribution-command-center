name: Daily Public Contribution Center

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "safe, assisted, or autopilot"
        required: true
        default: "safe"
        type: string
      confirm_publish:
        description: "Must be true to publish one external PR (assisted mode only)"
        required: false
        default: "false"
        type: string
      target_issue_url:
        description: "Optional specific public issue URL"
        required: false
        default: ""
        type: string
  schedule:
    # 08:00 Asia/Singapore == 00:00 UTC
    - cron: "0 0 * * *"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      MODE: ${{ inputs.mode || 'safe' }}
      TZ: Asia/Singapore
      CONFIRM_PUBLISH: ${{ inputs.confirm_publish || 'false' }}
      TARGET_ISSUE_URL: ${{ inputs.target_issue_url || '' }}

      # Environment variable to control whether cron can run autopilot
      # Set this in GitHub repository variables (Settings > Variables)
      ALLOW_CRON_AUTOPILOT: ${{ vars.ALLOW_CRON_AUTOPILOT || 'true' }}

      GH_TOKEN: ${{ secrets.PUBLIC_GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.PUBLIC_GITHUB_TOKEN }}

      LLM_PRIMARY_API_KEY: ${{ secrets.LLM_PRIMARY_API_KEY }}
      LLM_PRIMARY_BASE_URL: ${{ secrets.LLM_PRIMARY_BASE_URL }}
      LLM_PRIMARY_MODEL: ${{ secrets.LLM_PRIMARY_MODEL }}

      LLM_BACKUP_1_API_KEY: ${{ secrets.LLM_BACKUP_1_API_KEY }}
      LLM_BACKUP_1_BASE_URL: ${{ secrets.LLM_BACKUP_1_BASE_URL }}
      LLM_BACKUP_1_MODEL: ${{ secrets.LLM_BACKUP_1_MODEL }}

      LLM_BACKUP_2_API_KEY: ${{ secrets.LLM_BACKUP_2_API_KEY }}
      LLM_BACKUP_2_BASE_URL: ${{ secrets.LLM_BACKUP_2_BASE_URL }}
      LLM_BACKUP_2_MODEL: ${{ secrets.LLM_BACKUP_2_MODEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          token: ${{ secrets.PUBLIC_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]" || pip install -e .
          pip install pyyaml requests openai

      - name: gh auth login (read-only diagnostics)
        run: |
          echo "$GH_TOKEN" | gh auth login --with-token 2>&1 || true
          gh auth status 2>&1 || true
        continue-on-error: true

      - name: Run LLM health check
        run: |
          python -m contrib_center.main llm-check 2>&1 || true
        continue-on-error: true

      - name: Run public contribution center
        run: |
          # CRITICAL: cron-triggered runs mode determination
          # Only workflow_dispatch can use assisted/autopilot mode
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            echo "[SECURITY] Cron-triggered run"
            # Check if autopilot is allowed for cron
            if [ "$ALLOW_CRON_AUTOPILOT" = "true" ]; then
              echo "[INFO] ALLOW_CRON_AUTOPILOT=true, using autopilot mode"
              FORCED_MODE="autopilot"
            else
              echo "[INFO] ALLOW_CRON_AUTOPILOT=false, using safe mode"
              FORCED_MODE="safe"
            fi
            FORCED_CONFIRM="false"
          else
            echo "[INFO] Manual trigger (workflow_dispatch)"
            FORCED_MODE="${MODE}"
            FORCED_CONFIRM="${CONFIRM_PUBLISH}"
          fi
          echo "Running in mode: ${FORCED_MODE}"
          echo "Confirm publish: ${FORCED_CONFIRM}"
          python -m contrib_center.main run --mode ${FORCED_MODE} 2>&1
        # Intentionally NO continue-on-error:
        # if the pipeline fails, the workflow MUST fail.

      - name: Commit generated reports and data
        run: |
          git config user.name "github-public-contribution-bot"
          git config user.email "actions@github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add reports/ data/*.jsonl data/*.sqlite data/patches/ 2>/dev/null || true
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "chore: update daily public contribution report [skip ci]"
          git push origin main 2>&1
        continue-on-error: true
