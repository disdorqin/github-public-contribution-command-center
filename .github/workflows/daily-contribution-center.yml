# Daily Public Contribution Center
#
# PUBLIC-ONLY CONTRACT:
#   * This workflow MUST only ever be granted a token that has NO
#     access to private repositories. Use a PAT with scope=public_repo
#     only, or a dedicated GitHub App installation scoped to the
#     public repos listed in config/public_repos.yml.
#   * The contrib_center.visibility_guard module will refuse to operate
#     on any repo that is private or internal; this is enforced at
#     runtime and is the last line of defense even if a misconfigured
#     token is supplied.
#   * Safe Mode v1 NEVER publishes external PRs and NEVER publishes
#     external comments. It only writes reports, local data files, and
#     updates the fenced block in the profile README.

name: Daily Public Contribution Center

on:
  workflow_dispatch:
  schedule:
    # 09:00 Asia/Singapore == 01:00 UTC
    - cron: "0 1 * * *"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      MODE: safe
      TZ: Asia/Singapore
      GH_TOKEN: ${{ secrets.PUBLIC_GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.PUBLIC_GITHUB_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          token: ${{ secrets.PUBLIC_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]" || pip install -e .
          pip install pyyaml requests  # ensure deps

      - name: gh auth status
        run: |
          echo "$GH_TOKEN" | gh auth login --with-token 2>&1 || true
          gh auth status 2>&1 || true

      - name: Run public contribution center
        run: |
          python -m contrib_center.main run --mode safe 2>&1
        continue-on-error: true

      - name: Commit generated reports and data
        run: |
          git config user.name "github-public-contribution-bot"
          git config user.email "actions@github.com"
          # Use GH_TOKEN for git operations
          git remote set-url origin https://x-access-token:${{ secrets.PUBLIC_GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add reports/ data/*.jsonl data/*.sqlite 2>/dev/null || true
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "chore: update daily public contribution report [skip ci]"
          git push origin main 2>&1
